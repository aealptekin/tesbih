<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tane Tane Tesbih</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --bg-color: #f2f2f7;
      --text-color: #000000;
      --header-bg: rgba(255, 255, 255, 0.85);
      --border-color: #c6c6c8;
      
      /* Kehribar Dokusu */
      --c1: radial-gradient(circle at 35% 35%, #ffdb4d 0%, #f9a825 70%, #ef6c00 100%); 
      --c2: radial-gradient(circle at 35% 35%, #a52a2a 0%, #7b1313 70%, #4a0000 100%); 
      --c3: radial-gradient(circle at 35% 35%, #444 0%, #222 70%, #000 100%);      
      --c4: radial-gradient(circle at 35% 35%, #66bb6a 0%, #388e3c 70%, #1b5e20 100%);
      
      --active-grad: var(--c1);
    }

    [data-theme="dark"] {
      --bg-color: #000000;
      --text-color: #ffffff;
      --header-bg: rgba(28, 28, 30, 0.85);
      --border-color: #38383a;
    }

    * { box-sizing: border-box; -webkit-user-select: none; touch-action: none; }
    body, html { 
      height: 100%; margin: 0; background: var(--bg-color); 
      color: var(--text-color); overflow: hidden; font-family: -apple-system, sans-serif;
    }

    header {
      position: fixed; top: 0; width: 100%; height: 100px;
      padding: 50px 20px 10px; display: flex; justify-content: space-between;
      align-items: center; background: var(--header-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 100; border-bottom: 0.5px solid var(--border-color);
    }

    #status-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    #menu-trigger { font-size: 28px; cursor: pointer; padding: 5px; }

    /* Ana Sahne */
    main {
      height: 100vh; width: 100vw; display: flex;
      align-items: center; justify-content: center;
    }

    #beads-container {
      position: relative;
      width: 100%;
      height: 100%;
      /* GPU hızlandırma için */
      transform: translateZ(0); 
    }

    .bead {
      position: absolute; 
      /* Boncuklar daha da büyütüldü */
      width: 50px; 
      height: 60px; 
      border-radius: 22px; 
      background: var(--active-grad);
      /* Belirgin 3D ve yuvarlaklık etkisi */
      box-shadow: 
        4px 8px 15px rgba(0,0,0,0.4), 
        inset -4px -6px 8px rgba(0,0,0,0.3), 
        inset 4px 6px 10px rgba(255,255,255,0.4);
      transition: background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Menü Stilleri (Aynı kaldı) */
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
    #menu {
      position: fixed; bottom: -100%; left: 0; width: 100%;
      background: var(--bg-color); border-radius: 20px 20px 0 0;
      padding: 20px; z-index: 201; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .menu-row { padding: 18px 0; border-bottom: 0.5px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .btn-ios { background: #007aff; color: #fff; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 16px; }
  </style>
</head>
<body>

  <header>
    <div id="status-title">Sübhânallah 0</div>
    <div id="menu-trigger">⋮</div>
  </header>

  <main id="swipe-zone">
    <div id="beads-container"></div>
  </main>

  <div id="overlay"></div>
  <div id="menu">
    <div class="menu-row">
      <span>Görünüm</span>
      <button class="btn-ios" onclick="toggleTheme()">Değiştir</button>
    </div>
    <div class="menu-row">
      <span>Renk</span>
      <div style="display:flex; gap:12px;">
        <div class="color-dot" style="background:var(--c1)" onclick="setCol(1)"></div>
        <div class="color-dot" style="background:var(--c2)" onclick="setCol(2)"></div>
        <div class="color-dot" style="background:var(--c3)" onclick="setCol(3)"></div>
        <div class="color-dot" style="background:var(--c4)" onclick="setCol(4)"></div>
      </div>
    </div>
    <div class="menu-row">
      <button class="btn-ios" style="background:#ff3b30; width:100%" onclick="resetAll()">Sıfırla</button>
    </div>
    <button class="btn-ios" style="width:100%; margin-top:10px; background:#8e8e93" onclick="closeMenu()">Kapat</button>
  </div>

<script>
  let state = JSON.parse(localStorage.getItem('tesbih_v5')) || {
    count: 0, color: 1, theme: 'light'
  };

  const container = document.getElementById('beads-container');
  const title = document.getElementById('status-title');
  const totalBeads = 99;

  // Boncukları oluştur
  function initBeads() {
    container.innerHTML = '';
    for (let i = 0; i < totalBeads; i++) {
      const b = document.createElement('div');
      b.className = 'bead';
      container.appendChild(b);
    }
  }

  function updateVisuals() {
    document.body.setAttribute('data-theme', state.theme);
    document.documentElement.style.setProperty('--active-grad', `var(--c${state.color})`);
    
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    // Elipsi ekran dışına hafif taşıracak kadar büyütüyoruz (99 boncuk sığsın diye)
    // rX ve rY değerleri boncuklar arası 1mm (4-5px) boşluğu koruyacak şekilde hesaplandı
    const rx = w * 0.45; 
    const ry = h * 0.42; 
    
    const offsetAngle = (state.count / totalBeads) * Math.PI * 2;
    const beads = container.getElementsByClassName('bead');
    const angleStep = (2 * Math.PI) / totalBeads;

    for (let i = 0; i < totalBeads; i++) {
      const b = beads[i];
      const angle = (i * angleStep) + offsetAngle - Math.PI / 2;
      
      const x = rx * Math.cos(angle);
      const y = ry * Math.sin(angle);
      
      // Tam merkezleme ve GPU tabanlı taşıma
      const posX = (w / 2) + x - 25; // 25 = bead width / 2
      const posY = (h / 2) + y - 30; // 30 = bead height / 2

      b.style.transform = `translate3d(${posX}px, ${posY}px, 0) rotate(${angle + Math.PI / 2}deg)`;
    }

    // Başlık Mantığı
    let subCount = state.count % 99;
    let phase = Math.floor(subCount / 33);
    let step = (subCount % 33) || (subCount === 0 ? 0 : 33);
    let text = phase === 0 ? "Sübhânallah" : phase === 1 ? "Elhamdülillâh" : "Allâhu ekber";
    
    if(subCount === 0 && state.count > 0) { text = "Allâhu ekber"; step = 33; }
    title.innerText = `${text} ${step}`;
    
    localStorage.setItem('tesbih_v5', JSON.stringify(state));
  }

  // Swipe Algılama
  let startY = 0;
  document.getElementById('swipe-zone').addEventListener('touchstart', e => startY = e.touches[0].clientY);
  document.getElementById('swipe-zone').addEventListener('touchend', e => {
    let diff = e.changedTouches[0].clientY - startY;
    if (Math.abs(diff) > 25) { 
      state.count++;
      updateVisuals();
      if ('vibrate' in navigator) navigator.vibrate(45);
    }
  });

  // Menü
  document.getElementById('menu-trigger').onclick = () => {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('menu').style.bottom = '0';
  };
  function closeMenu() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('menu').style.bottom = '-100%';
  }
  function setCol(n) { state.color = n; updateVisuals(); }
  function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; updateVisuals(); }
  function resetAll() { state.count = 0; updateVisuals(); closeMenu(); }

  window.onload = () => { initBeads(); updateVisuals(); };
  window.onresize = updateVisuals;
</script>
</body>
</html>
