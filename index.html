<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tesbih & Zikirmatik</title>
  
  <style>
    :root {
      --bg-color: #f2f2f7;
      --text-color: #000;
      --header-bg: rgba(255, 255, 255, 0.85);
      --string-color: #8b0000; 
      
      /* Renk Dokuları */
      --c1: radial-gradient(circle at 35% 35%, #ffdb4d, #f9a825, #ef6c00); 
      --c2: radial-gradient(circle at 35% 35%, #a52a2a, #7b1313, #4a0000); 
      --c3: radial-gradient(circle at 35% 35%, #444, #222, #000);          
      --c4: radial-gradient(circle at 35% 35%, #66bb6a, #388e3c, #1b5e20); 
      
      --active-grad: var(--c1);
    }

    [data-theme="dark"] {
      --bg-color: #000;
      --text-color: #fff;
      --header-bg: rgba(28, 28, 30, 0.85);
      --string-color: #555;
    }

    * { box-sizing: border-box; -webkit-user-select: none; touch-action: none; }
    body, html { 
      height: 100%; margin: 0; background: var(--bg-color); 
      color: var(--text-color); overflow: hidden; font-family: -apple-system, sans-serif;
    }

    header {
      position: fixed; top: 0; width: 100%; height: 100px;
      padding: 50px 20px 10px; display: flex; justify-content: space-between;
      align-items: center; background: var(--header-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 100; border-bottom: 0.5px solid #c6c6c8;
    }

    #status-title { font-size: 24px; font-weight: 700; transition: 0.3s; }

    main {
      height: 100vh; width: 100vw; position: relative;
    }

    /* === TESBİH GÖRÜNÜMÜ === */
    #tesbih-view {
      position: absolute; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #string-line {
      position: absolute; width: 3px; height: 120%; 
      background: var(--string-color); box-shadow: 1px 0 2px rgba(0,0,0,0.2); z-index: 1;
    }
    #beads-container {
      position: relative; width: 100%; height: 100%; z-index: 2;
    }
    .bead {
      position: absolute; left: 50%; width: 55px; height: 65px; 
      margin-left: -27.5px; border-radius: 18px; background: var(--active-grad);
      box-shadow: 5px 10px 20px rgba(0,0,0,0.4), inset -4px -6px 10px rgba(0,0,0,0.3), inset 4px 6px 12px rgba(255,255,255,0.4);
    }

    /* === ZİKİRMATİK GÖRÜNÜMÜ === */
    #zikirmatik-view {
      position: absolute; width: 100%; height: 100%;
      display: none; align-items: center; justify-content: center; flex-direction: column;
    }
    #zikir-circle {
      width: 180px; height: 180px; border-radius: 50%; /* Biraz küçültüldü */
      margin-top: 120px; /* Başlığın altına daha fazla boşluk bırakıldı */
      background: var(--active-grad);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset -5px -10px 20px rgba(0,0,0,0.3), inset 5px 10px 20px rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 72px; font-weight: 800; color: #fff; text-shadow: 2px 4px 6px rgba(0,0,0,0.4);
      transition: transform 0.1s ease-out;
      cursor: pointer;
    }
    #zikir-circle.tap-anim {
      transform: scale(0.92);
    }

    /* === MENÜ === */
    #menu-btn { font-size: 28px; cursor: pointer; padding: 0 10px; z-index: 101; /* Menü butonunun her zaman üstte olmasını sağlar */}
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
    #menu {
      position: fixed; bottom: -100%; left: 0; width: 100%;
      background: var(--bg-color); border-radius: 20px 20px 0 0;
      padding: 20px; z-index: 201; transition: 0.4s; padding-bottom: env(safe-area-inset-bottom);
    }
    .menu-row { padding: 15px 0; border-bottom: 0.5px solid #c6c6c8; display: flex; justify-content: space-between; align-items: center; }
    .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; cursor: pointer;}
    .btn-ios { background: #007aff; color: #fff; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 15px;}
    .input-ios { 
      background: transparent; color: var(--text-color); border: 1px solid #c6c6c8; 
      border-radius: 12px; padding: 10px; font-size: 16px; width: 80px; text-align: center; font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <div id="status-title">Sübhânallah 0</div>
    <div id="menu-btn">⋮</div>
  </header>

  <main id="swipe-zone">
    
    <div id="tesbih-view">
      <div id="string-line"></div>
      <div id="beads-container"></div>
    </div>

    <div id="zikirmatik-view">
      <div id="zikir-circle" onclick="handleZikirmatikTap()">99</div>
    </div>

  </main>

  <div id="overlay"></div>
  <div id="menu">
    <div class="menu-row">
      <span>Mod</span>
      <button class="btn-ios" id="mode-btn" onclick="toggleMode()" style="background:#34c759;">Tesbih</button>
    </div>
    
    <div class="menu-row" id="zikir-settings" style="display:none;">
      <span>Hedef Sayı</span>
      <div style="display:flex; gap:10px;">
        <input type="number" id="zikir-input" class="input-ios" inputmode="numeric">
        <button class="btn-ios" onclick="saveZikirTarget()">Ayarla</button>
      </div>
    </div>

    <div class="menu-row">
      <span>Görünüm</span>
      <button class="btn-ios" onclick="toggleTheme()">Karanlık/Aydınlık</button>
    </div>
    <div class="menu-row">
      <span>Renk</span>
      <div style="display:flex; gap:10px;">
        <div class="color-dot" style="background:var(--c1)" onclick="setCol(1)"></div>
        <div class="color-dot" style="background:var(--c2)" onclick="setCol(2)"></div>
        <div class="color-dot" style="background:var(--c3)" onclick="setCol(3)"></div>
        <div class="color-dot" style="background:var(--c4)" onclick="setCol(4)"></div>
      </div>
    </div>
    <div class="menu-row">
      <button class="btn-ios" style="background:#ff3b30; width:100%" onclick="resetAll()">Sıfırla</button>
    </div>
    <button class="btn-ios" style="width:100%; margin-top:10px; background:#8e8e93" onclick="closeMenu()">Kapat</button>
  </div>

<script>
  // Varsayılan ayarları eski kaydedilmiş ayarlarla birleştiriyoruz
  const defaultState = { count: 0, color: 1, theme: 'light', mode: 'tesbih', zikirTarget: 99, zikirCount: 99 };
  let savedState = JSON.parse(localStorage.getItem('tesbih_v7')) || {};
  let state = { ...defaultState, ...savedState };

  const container = document.getElementById('beads-container');
  const title = document.getElementById('status-title');
  const totalBeads = 99;
  const beadHeight = 65; 
  const gap = 15;        
  const stepHeight = beadHeight + gap; 
  const dropDistance = 115; 

  function initApp() {
    // Tesbih boncuklarını oluştur
    container.innerHTML = '';
    for (let i = 0; i < totalBeads; i++) {
      const b = document.createElement('div');
      b.className = 'bead';
      b.style.top = `${-i * stepHeight}px`;
      container.appendChild(b);
    }
    
    // Zikirmatik input'una kayıtlı hedefi yaz
    document.getElementById('zikir-input').value = state.zikirTarget;
    
    updateVisuals(false);
  }

  function updateVisuals(animate = true) {
    // Tema ve Renk
    document.body.setAttribute('data-theme', state.theme);
    document.documentElement.style.setProperty('--active-grad', `var(--c${state.color})`);
    
    if (state.mode === 'tesbih') {
      // Menü ve Görünüm ayarlamaları
      document.getElementById('tesbih-view').style.display = 'flex';
      document.getElementById('zikirmatik-view').style.display = 'none';
      document.getElementById('mode-btn').innerText = 'Mod: Tesbih';
      document.getElementById('mode-btn').style.background = '#34c759';
      document.getElementById('zikir-settings').style.display = 'none';

      // Boncukların Hareketi
      const centerY = window.innerHeight / 2;
      const containerOffset = centerY - 130 + (state.count * stepHeight);
      
      container.style.transition = animate ? "transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)" : "none";
      container.style.transform = `translate3d(0, ${containerOffset}px, 0)`;

      const beads = document.querySelectorAll('.bead');
      beads.forEach((bead, i) => {
        bead.style.transition = animate ? "transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)" : "none";
        if (i < state.count) {
          bead.style.transform = `translate3d(0, ${dropDistance}px, 0)`;
        } else {
          bead.style.transform = `translate3d(0, 0, 0)`;
        }
      });

      // Tesbih Başlığı
      let subCount = state.count % 99;
      let phase = Math.floor(subCount / 33);
      let step = (subCount % 33) || (subCount === 0 && state.count > 0 ? 33 : 0);
      let text = (state.count > 0 && state.count % 99 === 0) ? "Allâhu ekber" : 
                 (phase === 0 ? "Sübhânallah" : phase === 1 ? "Elhamdülillâh" : "Allâhu ekber");
      
      title.innerText = `${text} ${step}`;

    } else {
      // ZİKİRMATİK MODU
      document.getElementById('tesbih-view').style.display = 'none';
      document.getElementById('zikirmatik-view').style.display = 'flex';
      document.getElementById('mode-btn').innerText = 'Mod: Zikirmatik';
      document.getElementById('mode-btn').style.background = '#ff9500'; /* Zikirmatik için turuncu renk */
      document.getElementById('zikir-settings').style.display = 'flex';

      document.getElementById('zikir-circle').innerText = state.zikirCount;
      
      if (state.zikirCount === 0) {
         title.innerText = "Hedefe Ulaşıldı!";
      } else {
         title.innerText = `Kalan Zikir: ${state.zikirCount} / ${state.zikirTarget}`;
      }
    }

    // Her durumda kaydet
    localStorage.setItem('tesbih_v7', JSON.stringify(state));
  }

  // --- ETKİLEŞİMLER (Swipe ve Dokunma) ---
  let startTime = 0, startY = 0, startX = 0;
  document.getElementById('swipe-zone').addEventListener('touchstart', e => {
    startTime = Date.now();
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  });
  
  document.getElementById('swipe-zone').addEventListener('touchend', e => {
    let diffTime = Date.now() - startTime;
    let diffX = e.changedTouches[0].clientX - startX;
    let diffY = e.changedTouches[0].clientY - startY;
    
    // Tap (Dokunma) algılama: Kısa süre ve az hareket
    const isTap = diffTime < 300 && Math.abs(diffX) < 10 && Math.abs(diffY) < 10;
    // Aşağı kaydırma (Swipe Down) algılama
    const isSwipeDown = diffY > 30;

    if (state.mode === 'tesbih') {
      // Tesbih modunda: Dokunma VEYA aşağı kaydırma ile bir sonraki boncuğa geçiş
      if (isTap || isSwipeDown) {
        state.count++;
        if (state.count > 99) state.count = 0; 
        updateVisuals();
        if (navigator.vibrate) navigator.vibrate(40);
      }
    } else {
      // Zikirmatik modunda: swipe-zone'daki dokunma mantığı, dairesel diskin onclick'i tarafından yönetilir.
      // Bu, menüye ulaşmayı engellemez.
    }
  });

  function handleZikirmatikTap() {
    // Tıklama animasyonu
    const circle = document.getElementById('zikir-circle');
    circle.classList.add('tap-anim');
    setTimeout(() => circle.classList.remove('tap-anim'), 100);

    if (state.zikirCount > 0) {
      state.zikirCount--;
      if (navigator.vibrate) navigator.vibrate(40);
    } else {
      // 0 iken basılırsa hedef sayıya geri döner (Reset)
      state.zikirCount = state.zikirTarget;
      if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    }
    updateVisuals(true);
  }

  // --- MENÜ İŞLEMLERİ ---
  document.getElementById('menu-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('menu').style.bottom = '0';
  };
  function closeMenu() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('menu').style.bottom = '-100%';
    // Inputtan çıkılmasını sağlar (klavyeyi gizler)
    document.getElementById('zikir-input').blur();
  }
  
  function toggleMode() {
    state.mode = state.mode === 'tesbih' ? 'zikirmatik' : 'tesbih';
    updateVisuals(false);
  }

  function saveZikirTarget() {
    const inputVal = parseInt(document.getElementById('zikir-input').value);
    if (!isNaN(inputVal) && inputVal > 0) {
      state.zikirTarget = inputVal;
      state.zikirCount = inputVal; // Yeni hedef belirlenince sayacı da günceller
      updateVisuals(false);
      closeMenu();
    }
  }

  function setCol(n) { state.color = n; updateVisuals(); }
  function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; updateVisuals(); }
  
  function resetAll() { 
    if(state.mode === 'tesbih') {
      state.count = 0; 
    } else {
      state.zikirCount = state.zikirTarget;
    }
    updateVisuals(false); 
    closeMenu(); 
  }
  // Service Worker Kaydı (PWA için)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          console.log('SW başarıyla kaydedildi:', registration.scope);
        })
        .catch(error => {
          console.log('SW kaydı başarısız oldu:', error);
        });
    });
  }

  window.onload = initApp;
  window.onresize = () => updateVisuals(false);
</script>
</body>
</html>
