<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>İpli Gerçekçi Tesbih</title>
  
  <style>
    :root {
      --bg-color: #f2f2f7;
      --text-color: #000;
      --header-bg: rgba(255, 255, 255, 0.85);
      --string-color: #8b0000; /* Kırmızımsı ip rengi */
      
      /* Renk Dokuları */
      --c1: radial-gradient(circle at 35% 35%, #ffdb4d, #f9a825, #ef6c00); /* Sarı Kehribar */
      --c2: radial-gradient(circle at 35% 35%, #a52a2a, #7b1313, #4a0000); /* Vişne */
      --c3: radial-gradient(circle at 35% 35%, #444, #222, #000);          /* Siyah */
      --c4: radial-gradient(circle at 35% 35%, #66bb6a, #388e3c, #1b5e20); /* Yeşil */
      
      --active-grad: var(--c1);
    }

    [data-theme="dark"] {
      --bg-color: #000;
      --text-color: #fff;
      --header-bg: rgba(28, 28, 30, 0.85);
      --string-color: #555;
    }

    * { box-sizing: border-box; -webkit-user-select: none; touch-action: none; }
    body, html { 
      height: 100%; margin: 0; background: var(--bg-color); 
      color: var(--text-color); overflow: hidden; font-family: -apple-system, sans-serif;
    }

    header {
      position: fixed; top: 0; width: 100%; height: 100px;
      padding: 50px 20px 10px; display: flex; justify-content: space-between;
      align-items: center; background: var(--header-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 100; border-bottom: 0.5px solid #c6c6c8;
    }

    #status-title { font-size: 24px; font-weight: 700; }

    /* Tesbih Alanı */
    main {
      height: 100vh; width: 100vw; display: flex;
      align-items: center; justify-content: center;
    }

    /* İp Çizgisi */
    #string-line {
      position: absolute;
      width: 3px;
      height: 120%; /* Ekrandan taşsın */
      background: var(--string-color);
      box-shadow: 1px 0 2px rgba(0,0,0,0.2);
      z-index: 1;
    }

    #beads-container {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .bead {
      position: absolute; 
      left: 50%;
      width: 55px;  /* Görseldeki gibi dolgun */
      height: 65px; 
      margin-left: -27.5px;
      border-radius: 18px; /* Kapsül yapısı */
      background: var(--active-grad);
      box-shadow: 
        5px 10px 20px rgba(0,0,0,0.4), 
        inset -4px -6px 10px rgba(0,0,0,0.3), 
        inset 4px 6px 12px rgba(255,255,255,0.4);
    }

    /* Menü */
    #menu-btn { font-size: 28px; cursor: pointer; }
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
    #menu {
      position: fixed; bottom: -100%; left: 0; width: 100%;
      background: var(--bg-color); border-radius: 20px 20px 0 0;
      padding: 20px; z-index: 201; transition: 0.4s;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .menu-row { padding: 15px 0; border-bottom: 0.5px solid #c6c6c8; display: flex; justify-content: space-between; align-items: center; }
    .color-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff; cursor: pointer;}
    .btn-ios { background: #007aff; color: #fff; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer;}
  </style>
</head>
<body>

  <header>
    <div id="status-title">Sübhânallah 0</div>
    <div id="menu-btn">⋮</div>
  </header>

  <main id="swipe-zone">
    <div id="string-line"></div>
    <div id="beads-container"></div>
  </main>

  <div id="overlay"></div>
  <div id="menu">
    <div class="menu-row">
      <span>Görünüm</span>
      <button class="btn-ios" onclick="toggleTheme()">Karanlık/Aydınlık</button>
    </div>
    <div class="menu-row">
      <span>Renk</span>
      <div style="display:flex; gap:10px;">
        <div class="color-dot" style="background:var(--c1)" onclick="setCol(1)"></div>
        <div class="color-dot" style="background:var(--c2)" onclick="setCol(2)"></div>
        <div class="color-dot" style="background:var(--c3)" onclick="setCol(3)"></div>
        <div class="color-dot" style="background:var(--c4)" onclick="setCol(4)"></div>
      </div>
    </div>
    <div class="menu-row">
      <button class="btn-ios" style="background:#ff3b30; width:100%" onclick="resetAll()">Sıfırla</button>
    </div>
    <button class="btn-ios" style="width:100%; margin-top:10px; background:#8e8e93" onclick="closeMenu()">Kapat</button>
  </div>

<script>
  let state = JSON.parse(localStorage.getItem('tesbih_v6')) || {
    count: 0, color: 1, theme: 'light'
  };

  const container = document.getElementById('beads-container');
  const title = document.getElementById('status-title');
  const totalBeads = 99;
  const beadHeight = 65; // Boncuk boyu
  const gap = 15;        // Boncuklar arası net boşluk
  const stepHeight = beadHeight + gap; // 80px
  const dropDistance = 115; // Çekilen tesbihin atlayacağı mesafe

  function initBeads() {
    container.innerHTML = '';
    for (let i = 0; i < totalBeads; i++) {
      const b = document.createElement('div');
      b.className = 'bead';
      // Boncukları ekranın yukarısına doğru diziyoruz (- değerler)
      // i=0 olan boncuk en alttaki "sıradaki" boncuk olur
      b.style.top = `${-i * stepHeight}px`;
      container.appendChild(b);
    }
    updateVisuals(false);
  }

  function updateVisuals(animate = true) {
    document.body.setAttribute('data-theme', state.theme);
    document.documentElement.style.setProperty('--active-grad', `var(--c${state.color})`);
    
    const centerY = window.innerHeight / 2;
    // Ortadaki 2 tesbihlik (yaklaşık 130px) boşluğun ekrana kusursuz hizalanması
    const containerOffset = centerY - 130 + (state.count * stepHeight);
    
    container.style.transition = animate ? "transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)" : "none";
    container.style.transform = `translate3d(0, ${containerOffset}px, 0)`;

    // Tesbih tanelerinin konumları
    const beads = document.querySelectorAll('.bead');
    beads.forEach((bead, i) => {
      bead.style.transition = animate ? "transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)" : "none";
      if (i < state.count) {
        // Çekilmiş (sayılmış) olanlar boşluğu atlayıp aşağı düşer
        bead.style.transform = `translate3d(0, ${dropDistance}px, 0)`;
      } else {
        // Henüz çekilmemiş olanlar yukarıda bekler
        bead.style.transform = `translate3d(0, 0, 0)`;
      }
    });

    // Başlık Yazısı (33'lük döngü)
    let subCount = state.count % 99;
    let phase = Math.floor(subCount / 33);
    let step = (subCount % 33) || (subCount === 0 && state.count > 0 ? 33 : 0);
    let text = "";
    
    if (state.count > 0 && state.count % 99 === 0) {
        text = "Allâhu ekber"; step = 33;
    } else {
        text = phase === 0 ? "Sübhânallah" : phase === 1 ? "Elhamdülillâh" : "Allâhu ekber";
    }
    
    title.innerText = `${text} ${step}`;
    localStorage.setItem('tesbih_v6', JSON.stringify(state));
  }

  // Swipe / Çekme İşlemi
  let startY = 0;
  document.getElementById('swipe-zone').addEventListener('touchstart', e => startY = e.touches[0].clientY);
  document.getElementById('swipe-zone').addEventListener('touchend', e => {
    let diff = e.changedTouches[0].clientY - startY;
    if (diff > 30) { // Aşağı çekince
      state.count++;
      // 99'u geçince boncukların başa dönmesi için 0'a eşitliyoruz
      if (state.count > 99) state.count = 0; 
      updateVisuals();
      if (navigator.vibrate) navigator.vibrate(40);
    }
  });

  // Menü İşlemleri
  document.getElementById('menu-btn').onclick = () => {
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('menu').style.bottom = '0';
  };
  function closeMenu() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('menu').style.bottom = '-100%';
  }
  function setCol(n) { state.color = n; updateVisuals(); }
  function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; updateVisuals(); }
  function resetAll() { state.count = 0; updateVisuals(false); closeMenu(); }

  window.onload = initBeads;
  window.onresize = () => updateVisuals(false);
</script>
</body>
</html>
